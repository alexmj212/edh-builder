# .github/workflows/e2e.yml
# Source: https://playwright.dev/docs/ci-intro (adapted with least-privilege permissions)
name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege — this workflow only needs to read the repo and upload artifacts.
permissions:
  contents: read

# Cancel stale runs for the same ref to save CI minutes.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck (src + e2e)
        run: npm run typecheck && npm run typecheck:e2e

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        run: npm run e2e
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
