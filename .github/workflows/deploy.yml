# .github/workflows/deploy.yml
# Build the Vite app and deploy to GitHub Pages on push to main.
# Pages site: https://alexmj212.github.io/edh-builder/
name: Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer runs cancel in-progress.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Vite bundle
        run: npm run build

      - name: SPA 404 fallback
        # GH Pages serves 404.html for unknown paths. Copy index.html so
        # client-side routes (react-router) survive direct navigation/refresh.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
